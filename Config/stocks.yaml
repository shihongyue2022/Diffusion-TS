model:
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
  params:
    seq_length: 30          # 与预测窗口一致
    feature_size: 98        # 等于 stock_data.csv 的列数(资产数)
    n_layer_enc: 2
    n_layer_dec: 2
    d_model: 64
    timesteps: 500
    sampling_timesteps: 500
    loss_type: 'l1'
    beta_schedule: 'cosine'
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-5
  max_epochs: 10000
  results_folder: ./Checkpoints_stock_30   # 与你实际 ckpt 目录保持一致
  gradient_accumulate_every: 2
  save_cycle: 1000
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 2000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.real_datasets.CustomDataset
    params:
      name: stock
      proportion: 1.0
      data_root: /home/shihongyue/unconditional-time-series-diffusion/external/Diffusion-TS/Data/stocks/train.csv  # 绝对路径更稳
      window: 30              # 与 seq_length 对齐
      save2npy: True
      neg_one_to_one: False
      seed: 123
      period: train

  test_dataset:
    target: Utils.Data_utils.real_datasets.CustomDataset
    params:
      name: stock
      proportion: 0.9
      data_root: /home/shihongyue/unconditional-time-series-diffusion/external/Diffusion-TS/Data/stocks/test.csv
      window: 30              # 与 seq_length 对齐
      save2npy: True
      neg_one_to_one: False
      seed: 123
      period: test
      style: separate
      distribution: geometric
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 200

  batch_size: 64
  sample_size: 64           # 与 --num_samples=64 对齐
  shuffle: True
